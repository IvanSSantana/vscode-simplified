<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Web - Yellow Theme</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>

    <div class="title-bar">
        <div class="title-bar-left">
            <div class="app-icon"><img src="logo.svg"></div>
            <ul class="menu-bar">
                <li class="menu-item">Arquivo</li>
                <li class="menu-item">Editar</li>
            </ul>
        </div>
        
        <div class="title-bar-center" id="title-bar-text">
            nome-pasta
        </div>
    </div>

    <div class="main-container">
        <div class="activity-bar">
            <div class="activity-icons">
                <div class="icon-wrapper active" id="explorer-icon" title="Explorador">
                    <svg viewBox="1 1 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 3H10a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V7z"></path>
                        <path d="M15 4v 6h4"></path>
                        <path d="M6 6v13a2 2 0 0 0 2 2h10"></path>
                    </svg>
                </div>
                <div class="icon-wrapper" id="search-icon" title="Pesquisar">
                    <svg viewBox="1 1 22 22">
                        <circle cx="11" cy="11" r="6.6"></circle>
                        <line x1="24" y1="24" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div id="panel-explorer" class="panel-content">
            <div class="sidebar-header">EXPLORADOR</div>           
                <div class="sidebar-item active" onclick="openFile('index.html')" data-file="index.html">
                    <span style="color: var(--yellow-tag); font-weight: bold;">&lt;&gt;</span> index.html
                </div>
                <div class="sidebar-item" onclick="openFile('style.css')" data-file="style.css">
                    <span style="color: #60a5fa; font-weight: bold;">#</span> style.css
                </div>
                <div class="sidebar-item" onclick="openFile('main.js')" data-file="main.js">
                    <span style="color: #facc15; font-weight: bold;">JS</span> main.js
            </div>
          </div>
        </div>

        <div id="panel-search" class="panel-content" style="display: none;">
            <div class="sidebar-header">PESQUISAR</div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Pesquisar...">
                <button id="search-button">Pesquisar</button>
            </div>
            <div id="search-results"></div>
        </div>

        <div class="editor-area">
            <div class="tabs-container" id="tabs-container"></div>
            <div class="breadcrumbs" id="breadcrumbs"></div>
            <div class="code-container">
                <div class="line-numbers" id="line-numbers">1</div>
                <div class="code-wrapper">
                    <textarea id="code-editor" spellcheck="false" oninput="updateEditor()" onscroll="syncScroll()"></textarea>
                    <pre id="code-display"></pre>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div>
            <span>❌ 0</span> &nbsp; <span>⚠️ 0</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <span>UTF-8</span>
            <span id="status-lang">HTML</span>
            <span>Go Live</span>
        </div>
    </div>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="script.js"></script>
</body>
</html>
