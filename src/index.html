<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Web Code</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/84cef182a4.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <img src="logo.svg" alt="Logo">
        <button id="arquivo">Arquivo</button>
        <button id="editar">Editar</button>

        <input type="text" value="nome-pasta">
    </header>

    <pao></pao>
    <main>
        <aside>
            <i class="fa-regular fa-file" title="TESTE"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
        </aside>

        <section class="area-codigo">
            <section class="abas-arquivos"></section>
            <textarea></textarea>
        </section>
        
    </main>

    <dialog id="opcoes-aba-arquivo" style="display: none;">
        <button option="novo-arquivo">Novo Arquivo</button>
        <button option="abrir-arquivo">Abrir Arquivo</button>
        <button option="salvar">Salvar</button>
        <button option="fechar-arquivo">Fechar Arquivo</button>
    </dialog>

    <dialog id="input-nome-arquivo">
        <input type="text" placeholder="Digite o nome do arquivo...">
    </dialog>

    <script type="module" src="arquivo.js"></script>
    <script type="module" src="listeners.js"></script>
</body>
</html>
