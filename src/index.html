<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Web Code</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="highlight_sintax.css">
    <script src="https://kit.fontawesome.com/84cef182a4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <header>
        <img src="logo.svg" alt="Logo" class="Vlower">
        <button id="arquivo">Arquivo</button>
        <button id="editar">Editar</button>

        <input type="text" value="nome-pasta">
    </header>

    <main>
        <aside>
            <i class="fa-regular fa-file" title="TESTE"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
        </aside>

        <section class="area-codigo">
            <section class="abas-arquivos"></section>

            <section class="editor">
                <pre id="codigo-render"></pre>
                <textarea id="codigo"></textarea>
            </section>
        </section>
    </main>

    <dialog id="opcoes-aba-arquivo" class="opcoes-aba" style="display: none;">
        <button option="novo-arquivo">Novo Arquivo <p class="atalho-abas-superiores-novo-arquivo">Shift + N</p></button>
        <button option="abrir-arquivo">Abrir Arquivo</button>
        <button option="salvar">Salvar <p class="atalho-abas-superiores-salvar">Shift + S</p></button>
        <button option="fechar-arquivo">Fechar Arquivo</button>
    </dialog>

    <dialog id="opcoes-aba-editar" class="opcoes-aba" style="display: none;">
        <button option="novo-arquivo">Novo Arquivo</button>
        <button option="abrir-arquivo">Abrir Arquivo</button>
        <button option="salvar">Transformar Linha em Comentário</button>
        <button option="fechar-arquivo">Transformar Bloco em Comentário</button>
    </dialog>

    <dialog id="input-nome-arquivo">
        <input type="text" placeholder="Digite o nome do arquivo..." class="texto-input" >
    </dialog>

    <script type="module" src="arquivo.js"></script>
    <script type="module" src="listeners.js"></script>
        
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body>
</html>
